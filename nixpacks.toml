name = "apt-studio"

[phases.setup]
nixPackages = ["rustup", "gcc", "pkg-config"]

[phases.install]
cmds = [
  "rustup toolchain install stable --profile minimal",
  "rustup default stable",
  "cargo fetch",
  "rm -f apt.db" # start with fresh DB on each deploy
]

[phases.build]
cmds = ["cargo build --release"]

[start]
cmd = "./target/release/apt-server"
